function viewBudderAvailable() {
  const unis = getBudderUniversities();
  const list = State.tickets
    .filter(t => isInAvailablePool(t) && unis.includes(t.universityPrefix))
    .sort((a, b) => {
      const prioRank = { high: 0, medium: 1, normal: 2 };
      const pa = prioRank[a.priority] ?? 2;
      const pb = prioRank[b.priority] ?? 2;
      if (pa !== pb) return pa - pb;
      return new Date(a.createdAt) - new Date(b.createdAt);
    });
  if (unis.length === 0) {
    return `<div class="card"><div class="empty">
      <div class="empty-icon">🎓</div>
      <div class="empty-title">ยังไม่มีมหาลัยที่ได้รับมอบหมาย</div>
      <div class="empty-desc">ติดต่อ Admin เพื่อ assign มหาลัยให้คุณดูแล</div>
    </div></div>`;
  }
  if (list.length === 0) {
    return `<div class="card"><div class="empty">
      <div class="empty-icon">✨</div>
      <div class="empty-title">ไม่มีงานที่รอรับในตอนนี้</div>
      <div class="empty-desc">มหาลัยที่ดูแล: ${unis.join(', ')} · มาเช็คอีกครั้งสักพักครับ</div>
    </div></div>`;
  }
  return `
    <div class="text-mute text-tiny mb-2">มหาลัยที่ดูแล: <strong>${unis.join(', ')}</strong></div>
    <div class="ticket-list">${list.map(t => renderBudderTicketCard(t, 'available')).join('')}</div>
  `;
}

function viewBudderMine() {
  const list = State.tickets
    .filter(t => isAssignedTo(t, State.profileName))
    .sort((a, b) => new Date(a.acceptedAt || a.createdAt) - new Date(b.acceptedAt || b.createdAt));
  if (list.length === 0) {
    return `<div class="card"><div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-title">ยังไม่มีงานที่กำลังทำ</div>
      <div class="empty-desc">ไปรับงานจาก "งานที่รอรับ" ได้เลย</div>
    </div></div>`;
  }
  return `<div class="ticket-list">${list.map(t => renderBudderTicketCard(t, 'mine')).join('')}</div>`;
}

function viewBudderClosed() {
  const list = State.tickets
    .filter(t => t.status === 'closed' && t.budderName === State.profileName)
    .sort((a, b) => new Date(b.closedAt) - new Date(a.closedAt));
  if (list.length === 0) {
    return `<div class="card"><div class="empty">
      <div class="empty-icon">📦</div>
      <div class="empty-title">ยังไม่มีงานที่ปิดแล้ว</div>
    </div></div>`;
  }
  const totalDorms = list.reduce((sum, t) => sum + (t.dormsSent || []).length, 0);
  const withTime = list.filter(t => t.acceptedAt && t.closedAt);
  const avgClose = withTime.length ? withTime.reduce((s, t) => s + (new Date(t.closedAt) - new Date(t.acceptedAt)), 0) / withTime.length : 0;
  return `
    <div class="kpi-grid">
      <div class="kpi-card kpi-good">
        <div class="kpi-label">งานที่ปิดแล้ว</div>
        <div class="kpi-value">${list.length}</div>
      </div>
      <div class="kpi-card kpi-yellow">
        <div class="kpi-label">หอที่ส่งทั้งหมด</div>
        <div class="kpi-value">${totalDorms}</div>
      </div>
      <div class="kpi-card kpi-accent">
        <div class="kpi-label">เวลาเฉลี่ยในการปิด</div>
        <div class="kpi-value" style="font-size: 22px;">${fmtDuration(avgClose)}</div>
      </div>
    </div>
    <div class="ticket-list">${list.map(t => renderBudderTicketCard(t, 'closed')).join('')}</div>`;
}

function renderBudderTicketCard(t, mode) {
  const og = ongoingTime(t);
  let timeBadge = '';
  if (og) {
    if (og.paused) {
      timeBadge = `<span class="badge status-on_hold"><span class="badge-dot"></span>⏸ พัก (${fmtDuration(og.elapsed)})</span>`;
    } else {
      const lvl = slaLevel(og.elapsed, og.target);
      const phaseTxt = og.phase === 'waiting_accept' ? 'รอรับ' : 'กำลังทำ';
      const bg = lvl === 'good' ? '#D1FAE5' : lvl === 'warning' ? '#FEF3C7' : '#FEE2E2';
      timeBadge = `<span class="badge sla-${lvl}" style="background: ${bg};">${phaseTxt} ${fmtDuration(og.elapsed)}</span>`;
    }
  } else if (t.status === 'closed') {
    const m = ticketMetrics(t);
    timeBadge = `<span class="badge status-closed"><span class="badge-dot"></span>ใช้เวลา ${fmtDuration(m.execCloseMs)}</span>`;
  }
  let actions = '';
  if (mode === 'available') {
    actions = `
      <button class="btn btn-secondary" onclick="openTicketDetail('${t.id}')">ดูรายละเอียด</button>
      <button class="btn btn-success" onclick="acceptTicket('${t.id}')">รับงาน</button>`;
  } else if (mode === 'mine') {
    if (t.status === 'on_hold') {
      // งานพักอยู่ — Budder ดูได้อย่างเดียว Admin จะเป็นคน resume
      actions = `<button class="btn btn-secondary" onclick="openTicketDetail('${t.id}')">ดูรายละเอียด</button>
                 <span class="text-mute text-tiny" style="align-self:center; padding: 0 8px;">⏸ รอ Admin กด Resume</span>`;
    } else {
      actions = `
        <button class="btn btn-secondary" onclick="openTicketDetail('${t.id}')">ดูรายละเอียด</button>
        <button class="btn btn-ghost" onclick="releaseTicket('${t.id}')">คืนงาน</button>
        <button class="btn btn-success" onclick="openCloseDialog('${t.id}')">ปิดงาน</button>`;
    }
  } else {
    actions = `<button class="btn btn-secondary" onclick="openTicketDetail('${t.id}')">ดูรายละเอียด</button>`;
  }
  const prioBadge = t.priority && t.priority !== 'normal'
    ? `<span class="badge priority-${t.priority === 'high' ? 'high' : 'medium'}">${PRIORITY[t.priority]}</span>` : '';
  return `
    <div class="ticket-card">
      <div class="ticket-card-head">
        <div class="row gap-2">
          <span class="ticket-id" style="font-size: 16px;">${escapeHtml(t.id)}</span>
          <span class="badge status-${t.status}"><span class="badge-dot"></span>${STATUS[t.status]}</span>
          ${prioBadge}
        </div>
        ${timeBadge}
      </div>
      <div class="ticket-card-meta">
        <div><span class="label">มหาลัย</span><div class="value">${escapeHtml(t.universityName || '—')}</div></div>
        <div><span class="label">Buddy</span><div class="value">${escapeHtml(t.buddyNickname || '—')}</div></div>
        <div><span class="label">LINE ID</span><div class="value">${escapeHtml(t.buddyLineId || '—')}</div></div>
        <div><span class="label">งบ</span><div class="value">${fmtBudget(t.budget)}</div></div>
        ${t.dormName ? `<div><span class="label">หอที่ระบุ</span><div class="value">${escapeHtml(t.dormName)}</div></div>` : ''}
        ${t.moveInDate ? `<div><span class="label">ย้ายเข้า</span><div class="value">${fmtDate(t.moveInDate)}</div></div>` : ''}
        ${t.budderName ? `<div><span class="label">ผู้รับ</span><div class="value">${escapeHtml(t.budderName)}</div></div>` : ''}
        ${t.status === 'closed' ? `<div><span class="label">หอที่ส่ง</span><div class="value">${(t.dormsSent || []).length} ที่</div></div>` : ''}
      </div>
      ${t.specialRequest ? `<div style="background: var(--surface-2); padding: 10px 14px; border-radius: var(--radius); font-size: 13px;"><span class="text-mute text-tiny">Request: </span>${escapeHtml(t.specialRequest)}</div>` : ''}
      <div class="ticket-card-actions">${actions}</div>
    </div>`;
}

/* =========================================================
   TICKET DETAIL MODAL
   ========================================================= */
async function openTicketDetail(id) {
  const t = State.tickets.find(x => x.id === id);
  if (!t) return;
  showModal(renderTicketDetailModal(t));
  const imgs = await Store.loadImages(t.id);
  const ig = $('#detail-images');
  if (ig) {
    if (imgs.length === 0) {
      ig.innerHTML = `<div class="text-mute text-tiny" style="padding: 8px 0;">— ไม่มีรูปแนบ —</div>`;
    } else {
      ig.innerHTML = imgs.map(d => `<div class="image-preview"><img src="${d}" onclick='viewImageFullscreen(this.src)'></div>`).join('');
    }
  }
}

function viewImageFullscreen(dataUrl) {
  const root = $('#modal-root');
  const div = document.createElement('div');
  div.className = 'modal-backdrop';
  div.style.zIndex = '60';
  div.onclick = () => div.remove();
  const img = document.createElement('img');
  img.src = dataUrl;
  img.style.cssText = 'max-width:95vw;max-height:95vh;border-radius:8px;box-shadow:var(--shadow-lg);';
  div.appendChild(img);
  root.appendChild(div);
}

function renderTicketDetailModal(t) {
  const m = ticketMetrics(t);
  const isAdmin = State.role === 'admin' || State.role === 'admin_master';
  const isMyJob = isAssignedTo(t, State.profileName);

  let footer = '';
  if (isAdmin) {
    const actions = [];
    if (t.status !== 'closed' && t.status !== 'cancelled') {
      actions.push(`<button class="btn btn-ghost" onclick="goEditTicket('${t.id}')">✏️ แก้ไข</button>`);
      if (t.status === 'on_hold') {
        actions.push(`<button class="btn btn-accent" onclick="resumeTicket('${t.id}')">▶️ Resume</button>`);
      } else {
        actions.push(`<button class="btn btn-ghost" onclick="setTicketStatus('${t.id}', 'on_hold')">⏸️ พักงาน</button>`);
      }
      if (t.status === 'accepted') actions.push(`<button class="btn btn-ghost" onclick="reassignTicket('${t.id}')">🔄 ให้คนอื่นรับ</button>`);
      actions.push(`<button class="btn btn-danger" onclick="cancelTicket('${t.id}')">❌ ยกเลิก</button>`);
    }
    actions.push(`<button class="btn btn-secondary" onclick="closeModal()">ปิด</button>`);
    footer = actions.join('');
  } else {
    const actions = [];
    if (isInAvailablePool(t)) {
      actions.push(`<button class="btn btn-success" onclick="acceptTicket('${t.id}'); closeModal();">รับงาน</button>`);
    } else if (isMyJob && t.status === 'accepted') {
      actions.push(`<button class="btn btn-ghost" onclick="closeModal(); releaseTicket('${t.id}');">คืนงาน</button>`);
      actions.push(`<button class="btn btn-success" onclick="closeModal(); openCloseDialog('${t.id}');">ปิดงาน</button>`);
    } else if (isMyJob && t.status === 'on_hold') {
      // Budder ดูได้ แต่ทำอะไรไม่ได้ Admin ต้อง Resume ก่อน
    }
    actions.push(`<button class="btn btn-secondary" onclick="closeModal()">ปิด</button>`);
    footer = actions.join('');
  }

  return `
    <div class="modal-header">
      <div>
        <div class="modal-title">${escapeHtml(t.id)}</div>
        <div class="row gap-2 mt-1">
          <span class="badge status-${t.status}"><span class="badge-dot"></span>${STATUS[t.status]}</span>
          ${t.priority && t.priority !== 'normal' ? `<span class="badge priority-${t.priority === 'high' ? 'high' : 'medium'}">${PRIORITY[t.priority]}</span>` : ''}
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="detail-section">

          <div class="timeline-item"><div class="timeline-dot ${t.createdAt ? 'done' : ''}"></div><div class="timeline-label ${t.createdAt ? 'done' : ''}">Admin เปิดใบงาน${t.adminName ? ` (${escapeHtml(t.adminName)})` : ''}</div><div class="timeline-time">${fmtDateTime(t.createdAt)}</div></div>
          <div class="timeline-item"><div class="timeline-dot ${t.acceptedAt ? 'done' : ''}"></div><div class="timeline-label ${t.acceptedAt ? 'done' : ''}">Budder รับงาน${t.budderName ? ` (${escapeHtml(t.budderName)})` : ''}</div><div class="timeline-time">${fmtDateTime(t.acceptedAt)}</div></div>
          <div class="timeline-item"><div class="timeline-dot ${t.closedAt ? 'done' : ''}"></div><div class="timeline-label ${t.closedAt ? 'done' : ''}">ปิดงาน</div><div class="timeline-time">${fmtDateTime(t.closedAt)}</div></div>
        </div>
        ${m.adminOpenMs != null || m.waitAcceptMs != null || m.execCloseMs != null || m.heldMs > 0 ? `
          <div class="mt-2" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; font-size: 12px;">
            ${m.adminOpenMs != null ? `<div><div class="text-mute text-tiny">Admin เปิดใน</div><div class="sla-${slaLevel(m.adminOpenMs, SLA.openWithin)}" style="font-weight:600;">${fmtDuration(m.adminOpenMs)}</div></div>` : ''}
            ${m.waitAcceptMs != null ? `<div><div class="text-mute text-tiny">รอรับ</div><div class="sla-${slaLevel(m.waitAcceptMs, SLA.acceptWithin)}" style="font-weight:600;">${fmtDuration(m.waitAcceptMs)}</div></div>` : ''}
            ${m.execCloseMs != null ? `<div><div class="text-mute text-tiny">Budder ปิดใน${m.heldMs > 0 ? ' (หักพัก)' : ''}</div><div class="sla-${slaLevel(m.execCloseMs, SLA.closeWithin)}" style="font-weight:600;">${fmtDuration(m.execCloseMs)}</div></div>` : ''}
            ${m.totalMs != null ? `<div><div class="text-mute text-tiny">เวลารวม</div><div style="font-weight:600;">${fmtDuration(m.totalMs)}</div></div>` : ''}
            ${m.heldMs > 0 ? `<div><div class="text-mute text-tiny">⏸ พักรวม</div><div style="color: var(--accent-dark); font-weight:600;">${fmtDuration(m.heldMs)}</div></div>` : ''}
          </div>` : ''}
      </div>

      <div class="detail-section">
        <div class="detail-section-title">ข้อมูล Buddy</div>
        <div class="detail-row"><div class="key">ชื่อเล่น</div><div class="val">${escapeHtml(t.buddyNickname || '—')}</div></div>
        <div class="detail-row"><div class="key">LINE ID</div><div class="val">${escapeHtml(t.buddyLineId || '—')}</div></div>
        <div class="detail-row"><div class="key">เบอร์โทร</div><div class="val">${escapeHtml(t.buddyPhone || '—')}</div></div>

        <div class="detail-row"><div class="key">วันที่ย้ายเข้า</div><div class="val">${t.moveInDate ? fmtDate(t.moveInDate) : '—'}</div></div>
        <div class="detail-row"><div class="key">Special Request</div><div class="val">${escapeHtml(t.specialRequest || '—')}</div></div>
        ${t.notes ? `<div class="detail-row"><div class="key">Notes</div><div class="val">${escapeHtml(t.notes)}</div></div>` : ''}

      ${t.dormsSent && t.dormsSent.length > 0 ? `

                <span class="text-mute text-tiny">${i+1}.</span>

            <div class="text-mute text-tiny mb-1">${t.releasedBy ? 'คืนโดย ' + escapeHtml(t.releasedBy) : ''} ${t.releasedAt ? '· ' + fmtDateTime(t.releasedAt) : ''}</div>

function goEditTicket(id) {
  closeModal();
  State.subView = 'create';
  const main = $('.main');
  if (main) { main.innerHTML = viewAdminCreate(id); attachInnerEvents(); }
}

// ----- Close Dialog -----
// Close outcome labels (ใช้ทั้งใน dialog และการแสดงผล)
const CLOSE_OUTCOMES = {
  no_reply:         { emoji: '😴', label: 'ส่งข้อมูลแล้ว แต่น้องไม่ตอบ',           color: '#94A3B8' },
  self_decide:      { emoji: '🤔', label: 'ส่งข้อมูลแล้ว น้องขอไปตัดสินใจเอง',     color: '#F59E0B' },
  visited_no_close: { emoji: '👀', label: 'พาไปชมห้องแล้ว แต่ปิดการขายไม่ได้',     color: '#EF4444' },
  visited_closed:   { emoji: '✅', label: 'พาไปชมห้องแล้ว และปิดการขายได้',        color: '#10B981' }
};

function openCloseDialog(id) {
  const t = State.tickets.find(x => x.id === id);
  if (!t) return;
  const existing = t.dormsSent || [];
  const outcomeOptions = Object.entries(CLOSE_OUTCOMES).map(([key, v]) => `
    <label class="close-outcome-option" data-outcome="${key}">
      <input type="radio" name="close-outcome" value="${key}">
      <div class="close-outcome-content">
        <div class="close-outcome-emoji">${v.emoji}</div>
        <div class="close-outcome-label">${escapeHtml(v.label)}</div>
      </div>
    </label>
  `).join('');
  showModal(`
    <div class="modal-header">
      <div>
        <div class="modal-title">ปิดงาน — ${escapeHtml(t.id)}</div>
        <div class="text-mute text-small mt-1">กรอกข้อมูลก่อนปิดงาน</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="detail-section-title">หอที่ส่งให้ Buddy <span class="req">*</span></div>
      <div class="field-hint mb-2">เพิ่มอย่างน้อย 1 หอ</div>
      <div class="dorm-list" id="dorms-list">
        ${(existing.length > 0 ? existing : [{ name: '', location: '' }]).map((d, i) => `
          <div class="dorm-row" data-idx="${i}">
            <input class="input dorm-name" type="text" placeholder="ชื่อหอ" value="${escapeHtml(d.name)}">
            <input class="input dorm-loc" type="text" placeholder="ทำเล/รายละเอียด (ไม่บังคับ)" value="${escapeHtml(d.location)}">
            <button class="remove-btn" onclick="removeDormRow(${i})">✕</button>
          </div>`).join('')}
      </div>
      <button class="btn btn-secondary btn-sm mt-2 mb-3" onclick="addDormRow()">+ เพิ่มหอ</button>

      <div class="detail-section-title mt-3">ผลการปิดงาน <span class="req">*</span></div>
      <div class="close-outcome-grid mb-3">${outcomeOptions}</div>

      <div class="field">
        <label class="field-label">รายละเอียดเพิ่มเติม <span id="notes-req" class="req" style="display:none">*</span></label>
        <textarea class="textarea" id="close-notes" placeholder="เช่น เหตุผลที่ปิดการขายไม่ได้ / สิ่งที่น้องชอบหรือไม่ชอบ / feedback อื่นๆ" rows="3"></textarea>
        <div class="field-hint" id="notes-hint">บังคับใส่สำหรับ 3 outcome แรก (ยกเว้น "ปิดการขายได้")</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-success" onclick="confirmCloseTicket('${id}')">✓ ปิดงาน</button>
    </div>`);

  // Wire outcome selection — show/hide required indicator on notes
  setTimeout(() => {
    $$('.close-outcome-option input[name="close-outcome"]').forEach(radio => {
      radio.addEventListener('change', () => {
        $$('.close-outcome-option').forEach(el => el.classList.remove('selected'));
        radio.closest('.close-outcome-option').classList.add('selected');
        const req = $('#notes-req');
        const hint = $('#notes-hint');
        if (radio.value === 'visited_closed') {
          if (req) req.style.display = 'none';
          if (hint) hint.textContent = 'Optional — ใส่ feedback ของน้องได้ถ้าต้องการ';
        } else {
          if (req) req.style.display = '';
          if (hint) hint.textContent = 'จำเป็นต้องระบุ — ช่วยให้ Admin วิเคราะห์ได้';
        }
      });
    });
  }, 30);
}

function addDormRow() {
  const list = $('#dorms-list');
  const idx = list.children.length;
  const div = document.createElement('div');
  div.className = 'dorm-row';
  div.dataset.idx = idx;
  div.innerHTML = `
    <input class="input dorm-name" type="text" placeholder="ชื่อหอ" value="">
    <input class="input dorm-loc" type="text" placeholder="ทำเล/รายละเอียด (ไม่บังคับ)" value="">
    <button class="remove-btn" onclick="removeDormRow(${idx})">✕</button>`;
  list.appendChild(div);
}
function removeDormRow(idx) {
  const list = $('#dorms-list');
  if (list.children.length <= 1) return;
  const row = list.querySelector(`[data-idx="${idx}"]`);
  if (row) row.remove();
}

async function confirmCloseTicket(id) {
  const t = State.tickets.find(x => x.id === id);
  if (!t) return;
  const rows = $$('#dorms-list .dorm-row');
  const dorms = rows.map(r => ({
    name: r.querySelector('.dorm-name').value.trim(),
    location: r.querySelector('.dorm-loc').value.trim()
  })).filter(d => d.name);
  if (dorms.length === 0) { toast('กรุณากรอกชื่อหออย่างน้อย 1 หอ', 'error'); return; }
  // Read outcome
  const outcomeRadio = $$('.close-outcome-option input[name="close-outcome"]').find(r => r.checked);
  if (!outcomeRadio) { toast('กรุณาเลือก "ผลการปิดงาน"', 'error'); return; }
  const closeOutcome = outcomeRadio.value;
  // Read notes
  const closeNotes = $('#close-notes').value.trim();
  // Notes บังคับสำหรับ 3 outcome แรก (ยกเว้น visited_closed)
  if (closeOutcome !== 'visited_closed' && !closeNotes) {
    toast('กรุณากรอกรายละเอียดเพิ่มเติม (จำเป็นสำหรับ outcome นี้)', 'error');
    return;
  }
  const updated = { ...t, dormsSent: dorms, status: 'closed', closedAt: nowISO(), closeOutcome, closeNotes: closeNotes || null };
  const ok = await Store.saveTicket(updated);
  if (ok) {
    closeModal();
    toast('ปิดงานเรียบร้อย ✓', 'success');
  }
}

/* =========================================================
   TICKET ACTIONS
   ========================================================= */
async function acceptTicket(id) {
  if (!State.profileName) { toast('กรุณาเลือกชื่อก่อน', 'error'); return; }
  const t = State.tickets.find(x => x.id === id);
  if (!t) return;
  if (!isInAvailablePool(t)) { toast('งานนี้ไม่สามารถรับได้แล้ว', 'error'); return; }
  // Defensive: ตรวจว่า Budder มีสิทธิ์ดูแลมหาลัยนี้ (filter น่าจะกันไว้แล้ว แต่กันเหนียว)
  if (State.role === 'budder') {
    const unis = getBudderUniversities();
    if (!unis.includes(t.universityPrefix)) {
      toast('ไม่มีสิทธิ์รับงานของมหาลัยนี้ — ติดต่อ Admin', 'error');
      return;
    }
  }
  const updated = { ...t, status: 'accepted', acceptedAt: nowISO(), budderName: State.profileName };
  const ok = await Store.saveTicket(updated);
  if (ok) toast(`รับงาน ${id} เรียบร้อย`, 'success');
}

function releaseTicket(id) {
  const t = State.tickets.find(x => x.id === id);
  if (!t) return;
  showModal(`
    <div class="modal-header">
      <div class="modal-title">คืนงาน — ${escapeHtml(t.id)}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <p class="mb-3 text-small">งานนี้จะถูกคืนกลับเข้า pool ให้ Budder คนอื่นรับ</p>
      <div class="field">
        <label class="field-label">เหตุผลในการคืนงาน <span class="req">*</span></label>
        <textarea class="textarea" id="release-reason" placeholder="เช่น ไม่มีเวลา / มีงานเร่งด่วน / น้องไม่ตอบนาน / มหาลัยไม่ตรงกับที่ดูแล" rows="3" required></textarea>
        <div class="field-hint">Admin จะเห็นเหตุผลนี้ในรายละเอียดใบงาน</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-danger" onclick="confirmReleaseTicket('${id}')">✓ ยืนยันการคืนงาน</button>
    </div>
  `);
}

async function confirmReleaseTicket(id) {
  const t = State.tickets.find(x => x.id === id);
  if (!t) return;
  const reason = $('#release-reason').value.trim();
  if (!reason) { toast('กรุณากรอกเหตุผล', 'error'); return; }
  const updated = {
    ...t,
    status: 'reassigned',
    acceptedAt: null,
    budderName: null,
    holdStartedAt: null,
    releaseReason: reason,
    releasedAt: nowISO(),
    releasedBy: State.profileName || 'unknown'
  };
  const ok = await Store.saveTicket(updated);
  if (ok) {
    closeModal();
    toast(`คืนงาน ${id} แล้ว`, 'success');
  }
}

async function setTicketStatus(id, newStatus) {
  const t = State.tickets.find(x => x.id === id);
  if (!t) return;
  const updated = { ...t, status: newStatus };
  if (newStatus === 'on_hold') {
    // พักงาน — เก็บ Budder และ acceptedAt ไว้ เริ่มจับเวลาพัก
    updated.holdStartedAt = nowISO();
  } else if (newStatus === 'reassigned') {
    // ปล่อยกลับ pool — ลบ Budder
    updated.acceptedAt = null;
    updated.budderName = null;
    updated.holdStartedAt = null;
  }
  const ok = await Store.saveTicket(updated);
  if (ok) { closeModal(); toast(`เปลี่ยนสถานะเป็น "${STATUS[newStatus]}"`, 'success'); }
}

async function resumeTicket(id) {
  const t = State.tickets.find(x => x.id === id);
  if (!t || t.status !== 'on_hold') return;
  // คำนวณเวลาพักครั้งนี้ บวกเข้า totalHeldMs
  const heldMs = t.holdStartedAt ? Date.now() - new Date(t.holdStartedAt).getTime() : 0;
  const newTotal = (t.totalHeldMs || 0) + heldMs;
  // กลับไปสถานะเดิม — ถ้ามี Budder = accepted, ถ้าไม่ = reassigned
  const newStatus = t.budderName ? 'accepted' : 'reassigned';
  const updated = {
    ...t,
    status: newStatus,
    holdStartedAt: null,
    totalHeldMs: newTotal
  };
  const ok = await Store.saveTicket(updated);
  if (ok) {
    closeModal();
    toast(`▶️ Resume งาน${t.budderName ? ` — กลับให้ ${t.budderName}` : ''} (พักไป ${fmtDuration(heldMs)})`, 'success');
  }
}

async function reassignTicket(id) {
  if (!confirm(`ให้งาน ${id} กลับไปอยู่ใน pool ?`)) return;
  await setTicketStatus(id, 'reassigned');
}

async function cancelTicket(id) {
  if (!confirm(`ยกเลิกใบงาน ${id} ?`)) return;
  const t = State.tickets.find(x => x.id === id);
  if (!t) return;
  const updated = { ...t, status: 'cancelled', cancelledAt: nowISO() };
  const ok = await Store.saveTicket(updated);
  if (ok) { closeModal(); toast('ยกเลิกใบงานแล้ว', 'success'); }
}

/* =========================================================
   MASTER DATA ACTIONS
   ========================================================= */
async function addListItem(kind) {
  const input = $(`#new-${kind}`);
  const v = input.value.trim();
  if (!v) return;
  if (State.masters[kind].includes(v)) { toast('มีรายชื่อนี้แล้ว', 'error'); return; }
  State.masters[kind].push(v);
  input.value = '';
  await Store.saveMasters();
}
async function removeListItem(kind, idx) {
  if (!confirm('ลบรายการนี้?')) return;
  State.masters[kind].splice(idx, 1);
  await Store.saveMasters();
}

async function addUniversity() {
  const name = $('#new-uni-name').value.trim();
  const prefix = $('#new-uni-prefix').value.trim().toUpperCase();
  if (!name || !prefix) { toast('กรอกข้อมูลให้ครบ', 'error'); return; }
  if (!/^[A-Z0-9]{2,5}$/.test(prefix)) { toast('Prefix ต้องเป็น A-Z หรือ 0-9 ความยาว 2-5 ตัว', 'error'); return; }
  if (State.masters.universities.some(u => u.prefix === prefix)) { toast('Prefix นี้ใช้แล้ว', 'error'); return; }
  State.masters.universities.push({ name, prefix });
  if (!State.masters.counters[prefix]) State.masters.counters[prefix] = 0;
  $('#new-uni-name').value = ''; $('#new-uni-prefix').value = '';
  await Store.saveMasters();
}
async function removeUniversity(idx) {
  const u = State.masters.universities[idx];
  if (State.tickets.some(t => t.universityPrefix === u.prefix)) { toast('มีใบงานที่อ้างถึงมหาลัยนี้แล้ว ลบไม่ได้', 'error'); return; }
  if (!confirm(`ลบ ${u.name} (${u.prefix}) ?`)) return;
  State.masters.universities.splice(idx, 1);
  await Store.saveMasters();
}

   ========================================================= */
function exportExcel() {
  const from = new Date(State.reportFrom).getTime();
  const to = new Date(State.reportTo).getTime() + 86400000;
  const rows = State.tickets
    .filter(t => { const c = new Date(t.createdAt).getTime(); return c >= from && c <= to; })
    .map(t => {
      const m = ticketMetrics(t);
      return {
        'รหัสใบงาน': t.id,
        'สถานะ': STATUS[t.status],
        'Priority': PRIORITY[t.priority || 'normal'],
        'Admin': t.adminName || '',
        'Certified Budder': t.budderName || '',
        'มหาวิทยาลัย': t.universityName || '',
        'หอที่ระบุ': t.dormName || '',
        'งบประมาณ': t.budget || '',
        'วันย้ายเข้า': t.moveInDate || '',
        'Buddy LINE ID': t.buddyLineId || '',
        'ชื่อ Buddy': t.buddyNickname || '',
        'เบอร์โทร': t.buddyPhone || '',
        'Special Request': t.specialRequest || '',
        'Notes': t.notes || '',
        'ลูกค้าทักล่าสุด': t.customerLastContactAt ? fmtDateTime(t.customerLastContactAt) : '',
        'เปิดงาน': t.createdAt ? fmtDateTime(t.createdAt) : '',
        'รับงาน': t.acceptedAt ? fmtDateTime(t.acceptedAt) : '',
        'ปิดงาน': t.closedAt ? fmtDateTime(t.closedAt) : '',
        'เวลา Admin เปิด (นาที)': m.adminOpenMs != null ? Math.round(m.adminOpenMs / 60000) : '',
        'เวลารอรับ (นาที)': m.waitAcceptMs != null ? Math.round(m.waitAcceptMs / 60000) : '',
        'เวลา Budder ปิด (นาที)': m.execCloseMs != null ? Math.round(m.execCloseMs / 60000) : '',
        'เวลารวม (นาที)': m.totalMs != null ? Math.round(m.totalMs / 60000) : '',
        'จำนวนหอที่ส่ง': (t.dormsSent || []).length,
        'รายชื่อหอที่ส่ง': (t.dormsSent || []).map(d => d.name + (d.location ? ` (${d.location})` : '')).join('; ')
      };
    });
  if (rows.length === 0) { toast('ไม่มีข้อมูลในช่วงที่เลือก', 'error'); return; }
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'ใบงาน');
  const fname = `PropertyBuddy_Report_${State.reportFrom}_${State.reportTo}.xlsx`;
  XLSX.writeFile(wb, fname);
  toast('ดาวน์โหลด Excel เรียบร้อย', 'success');
}

/* =========================================================
   RENDER & EVENTS
   ========================================================= */
async function render() {
  try {
    const app = $('#app');
    ChartRegistry.destroyAll();

    if (!State.firebaseReady) { app.innerHTML = viewFirebaseSetup(); attachFirebaseSetupEvents(); return; }
    if (!State.authed) { app.innerHTML = viewLogin(); attachLoginEvents(); return; }
    if (!State.profileName) { app.innerHTML = viewProfileSelect(); attachProfileEvents(); return; }

    if (!State.timerInterval) {
      State.timerInterval = setInterval(() => {
        if (State.view === 'admin' && State.subView === 'tickets') renderInner(viewAdminTickets());
        else if (State.view === 'budder' && (State.subView === 'available' || State.subView === 'mine')) {
          const inner = State.subView === 'available' ? viewBudderAvailable() : viewBudderMine();
          renderInner(inner);
        }
      }, 30000);
    }

    let inner = '';
    const isAnyAdmin = State.role === 'admin' || State.role === 'admin_master';
    if (isAnyAdmin) {
      // Guard: regular admin ห้ามเข้า reports
      if (State.subView === 'reports' && State.role !== 'admin_master') {
        State.subView = 'tickets';
      }
      if (State.subView === 'tickets') inner = viewAdminTickets();
      else if (State.subView === 'create') inner = viewAdminCreate();
      else if (State.subView === 'masters') inner = viewAdminMasters();
      else if (State.subView === 'reports') inner = viewAdminReports();
    } else {
      if (State.subView === 'available') inner = viewBudderAvailable();
      else if (State.subView === 'mine') inner = viewBudderMine();
      else if (State.subView === 'closed') inner = viewBudderClosed();
    }
    app.innerHTML = viewAppShell(inner);
    attachShellEvents();
    attachInnerEvents();

    // Render charts after DOM is set (เฉพาะ admin_master)
    if (State.role === 'admin_master' && State.subView === 'reports') {
      setTimeout(() => {
        try { renderReportsCharts(); }
        catch (e) {
          console.error('Chart render error:', e);
          toast('วาดกราฟไม่สำเร็จ: ' + e.message, 'error');
        }
      }, 50);
    }
  } catch (e) {
    console.error('Render error:', e);
    toast('เกิดข้อผิดพลาด: ' + e.message, 'error');
    // Show error fallback so user isn't stuck
    const app = $('#app');
    if (app && State.authed) {
      app.innerHTML = `<div class="login-wrap"><div class="login-card">
        <div class="login-logo">⚠️</div>
        <h1 class="login-title">เกิดข้อผิดพลาด</h1>
        <p class="login-subtitle">${escapeHtml(e.message)}</p>
        <button class="btn btn-primary btn-block mt-3" onclick="location.reload()">โหลดใหม่</button>
        <button class="btn btn-ghost btn-block mt-2" onclick="logout()">ออกจากระบบ</button>
      </div></div>`;
    }
  }
}

function renderInner(html) {
  const main = $('.main');
  if (main) {
    ChartRegistry.destroyAll();
    main.innerHTML = html;
    attachInnerEvents();
    if (State.role === 'admin_master' && State.subView === 'reports') setTimeout(renderReportsCharts, 50);
  }
}

function attachFirebaseSetupEvents() {
  const form = $('#firebase-form');
  if (form) form.addEventListener('submit', handleFirebaseSetup);
}

async function handleFirebaseSetup(e) {
  e.preventDefault();
  const text = $('#firebase-config').value.trim();
  let config;
  try { config = JSON.parse(text); }
  catch (e1) {
    try { config = (new Function('return ' + text))(); }
    catch (e2) {
      $('#firebase-err').innerHTML = `<div class="login-error">Config format ไม่ถูกต้อง — ตรวจสอบเครื่องหมาย { } และ , ให้ครบ</div>`;
      return;
    }
  }
  if (!config || !config.apiKey || !config.projectId) {
    $('#firebase-err').innerHTML = `<div class="login-error">Config ไม่ครบ — ต้องมี apiKey และ projectId</div>`;
    return;
  }
  const btn = e.target.querySelector('button[type="submit"]');
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังเชื่อมต่อ...'; }
  const result = await Store.init(config);
  if (!result.ok) {
    $('#firebase-err').innerHTML = `<div class="login-error">เชื่อมต่อไม่สำเร็จ: ${escapeHtml(result.error)}</div>`;
    if (btn) { btn.disabled = false; btn.textContent = 'เชื่อมต่อ Firebase'; }
    return;
  }
  try { localStorage.setItem(LS_KEY_FIREBASE, JSON.stringify(config)); } catch (e) {}
  Store.subscribeMasters();
  Store.subscribeTickets();
  toast('เชื่อมต่อ Firebase สำเร็จ ✓', 'success');
  setTimeout(render, 500);
}

function resetFirebaseConfig() {
  if (!confirm('ล้าง Firebase config และตั้งค่าใหม่? (ข้อมูลใน Firestore ของคุณยังอยู่ครบ — แค่ disconnect จากเครื่องนี้)')) return;
  try { localStorage.removeItem(LS_KEY_FIREBASE); } catch (e) {}
  Store.disconnect();
  State.firebaseReady = false;
  State.authed = false; State.role = null; State.profileName = null;
  State.masters = { admins: [], budders: [], universities: [], counters: {} };
  State.tickets = [];
  render();
}

const CreateFormState = { editingId: null, images: [] };

async function attachCreateForm() {
  const editingId = $('#edit-id').value || null;
  CreateFormState.editingId = editingId;
  CreateFormState.images = [];

  if (editingId) {
    const imgs = await Store.loadImages(editingId);
    CreateFormState.images = imgs.slice();
    renderImagePreview();
  }

  $('#image-input').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    if (CreateFormState.images.length + files.length > 3) { toast('แนบรูปได้สูงสุด 3 รูป', 'error'); e.target.value = ''; return; }
    for (const f of files) {
      try {
        const data = await compressImage(f);
        CreateFormState.images.push(data);
      } catch (err) {
        toast('โหลดรูปไม่สำเร็จ: ' + err.message, 'error');
      }
    }
    e.target.value = '';
    renderImagePreview();
  });

  $('#create-cancel').addEventListener('click', () => {
    State.subView = 'tickets';
    render();
  });

  $('#create-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    await submitCreateForm();
  });
}

function renderImagePreview() {
  const grid = $('#image-preview');
  if (!grid) return;
  if (CreateFormState.images.length === 0) { grid.innerHTML = ''; return; }
  grid.innerHTML = CreateFormState.images.map((d, i) => `
    <div class="image-preview">
      <img src="${d}">
      <button type="button" class="image-preview-remove" onclick="removeImageAt(${i})">✕</button>
    </div>`).join('');
}
function removeImageAt(i) {
  CreateFormState.images.splice(i, 1);
  renderImagePreview();
}

async function submitCreateForm() {
  const editingId = CreateFormState.editingId;
  const adminName = $('#adminName').value;
  const universityPrefix = $('#universityPrefix').value;
  const customerLastContact = $('#customerLastContact').value;
  const buddyLineId = $('#buddyLineId').value.trim();
  const buddyNickname = $('#buddyNickname').value.trim();
  const buddyPhone = $('#buddyPhone').value.trim();
  const priority = $('#priority').value;
  const dormName = $('#dormName').value.trim();
  const budget = $('#budget').value ? Number($('#budget').value) : null;
  const moveInDate = $('#moveInDate').value || null;
  const specialRequest = $('#specialRequest').value.trim();
  const notes = $('#notes').value.trim();

  if (!adminName || !universityPrefix || !buddyLineId || !buddyNickname || !customerLastContact) {
    toast('กรุณากรอกข้อมูลที่จำเป็น (*) ให้ครบ', 'error'); return;
  }
  const uni = State.masters.universities.find(u => u.prefix === universityPrefix);
  if (!uni) { toast('ไม่พบมหาลัยที่เลือก', 'error'); return; }

  const submitBtn = $('#create-submit');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'กำลังบันทึก...'; }

  let ticket;
  if (editingId) {
    ticket = { ...State.tickets.find(t => t.id === editingId) };
    // ไม่อัปเดต customerLastContactAt ตอน edit — ล็อกหลังเปิดใบงาน
    Object.assign(ticket, {
      adminName, universityPrefix, universityName: uni.name,
      buddyLineId, buddyNickname, buddyPhone, priority,
      dormName: dormName || null, budget, moveInDate, specialRequest: specialRequest || null, notes: notes || null
    });
  } else {
    const id = generateTicketId(universityPrefix);
    ticket = {
      id,
      status: 'new',
      adminName, universityPrefix, universityName: uni.name,
      customerLastContactAt: new Date(customerLastContact).toISOString(),
      createdAt: nowISO(),
      buddyLineId, buddyNickname, buddyPhone: buddyPhone || null, priority,
      dormName: dormName || null, budget, moveInDate, 
      specialRequest: specialRequest || null, notes: notes || null,
      acceptedAt: null, closedAt: null, cancelledAt: null,
      budderName: null, dormsSent: [],
      holdStartedAt: null, totalHeldMs: 0
    };
  }

  const okT = await Store.saveTicket(ticket);
  const okM = await Store.saveMasters();
  await Store.saveImages(ticket.id, CreateFormState.images);

  if (okT && okM) {
    toast(editingId ? 'บันทึกการแก้ไขเรียบร้อย' : `เปิดใบงาน ${ticket.id} เรียบร้อย`, 'success');
    State.subView = 'tickets';
    render();
  } else {
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = editingId ? 'บันทึกการแก้ไข' : 'เปิดใบงาน'; }
  }
}

/* =========================================================
   BACKUP — Export / Import
   ========================================================= */
async function exportBackup() {
  toast('กำลังเตรียมข้อมูล...', 'info');
  try {
    // Load all images
    const images = {};
    let imageCount = 0;
    for (const t of State.tickets) {
      const imgs = await Store.loadImages(t.id);
      if (imgs && imgs.length > 0) {
        images[t.id] = imgs;
        imageCount += imgs.length;
      }
    }
    const backup = {
      schemaVersion: '1.0',
      app: 'PropertyBuddy',
      exportedAt: nowISO(),
      masters: State.masters,
      tickets: State.tickets,
      images: images
    };
    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `PropertyBuddy_Backup_${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast(`✓ Export สำเร็จ — ${State.tickets.length} ใบงาน, ${imageCount} รูป`, 'success');
  } catch (e) {
    toast('Export ไม่สำเร็จ: ' + e.message, 'error');
  }
}

  if (!data || !data.masters || !Array.isArray(data.tickets)) {
    $('#import-preview').innerHTML = `<div class="login-error">ไฟล์ไม่ใช่ backup ของ Property Buddy</div>`;
    return;
  }
  window._importData = data;
  const adminCount = data.masters.admins?.length || 0;
  const budderCount = data.masters.budders?.length || 0;
  const uniCount = data.masters.universities?.length || 0;
  const imageSetCount = Object.keys(data.images || {}).length;
  $('#import-preview').innerHTML = `
    <div class="card" style="background: var(--surface-2);">
      <div class="card-body" style="padding: 16px;">
        <div class="detail-section-title">ข้อมูลใน backup</div>
        <div class="detail-row"><div class="key">Export เมื่อ</div><div class="val">${fmtDateTime(data.exportedAt)}</div></div>
        <div class="detail-row"><div class="key">Admins</div><div class="val">${adminCount} คน</div></div>
        <div class="detail-row"><div class="key">Budders</div><div class="val">${budderCount} คน</div></div>
        <div class="detail-row"><div class="key">มหาวิทยาลัย</div><div class="val">${uniCount} แห่ง</div></div>
        <div class="detail-row"><div class="key">ใบงาน</div><div class="val">${data.tickets.length} ใบ</div></div>
        <div class="detail-row"><div class="key">รูปแนบ</div><div class="val">${imageSetCount} ชุด</div></div>
      </div>
    </div>
    <div class="row mt-3" style="justify-content: flex-end; gap: 10px;">
      <button class="btn btn-secondary" onclick="performImport('merge')">+ Merge เข้าของเดิม</button>
      <button class="btn btn-danger" onclick="performImport('replace')">⚠ Replace ทับทั้งหมด</button>
    </div>
    <div class="text-tiny text-mute mt-2" style="line-height:1.7;">
      <strong>Merge:</strong> เพิ่มข้อมูลที่ ID ไม่ซ้ำ คงของเดิมไว้<br>
      <strong>Replace:</strong> ลบของเดิมทั้งหมด ใช้ backup แทน (ระวัง!)
    </div>
  `;
}

async function performImport(mode) {
  const data = window._importData;
  if (!data) return;
  const confirmMsg = mode === 'replace'
    ? `⚠ REPLACE จะลบข้อมูลปัจจุบันทั้งหมดและใช้ backup แทน — ยืนยัน?`
    : `MERGE จะเพิ่มข้อมูลที่ ID ไม่ซ้ำ — ยืนยัน?`;
  if (!confirm(confirmMsg)) return;

  toast('กำลัง import...', 'info');

  try {
    if (mode === 'replace') {
      State.masters = {
        admins: data.masters.admins || [],
        budders: data.masters.budders || [],
        universities: data.masters.universities || [],
        counters: data.masters.counters || {}
      };
      await Store.saveMasters();
      for (const t of data.tickets) await Store.saveTicket(t);
      for (const [id, imgs] of Object.entries(data.images || {})) await Store.saveImages(id, imgs);
    } else {
      // Merge admins: dedupe by username (or name if no username)
      const existingAdminMap = new Map();
      State.masters.admins.forEach(a => {
        if (typeof a === 'object' && a) existingAdminMap.set((a.username || a.name || '').toLowerCase(), a);
      });
      (data.masters.admins || []).forEach(a => {
        if (typeof a === 'string') {
          const key = a.toLowerCase();
          if (!existingAdminMap.has(key)) existingAdminMap.set(key, { name: a, username: null, password: null });
        } else if (a && typeof a === 'object') {
          const key = (a.username || a.name || '').toLowerCase();
          if (!existingAdminMap.has(key)) existingAdminMap.set(key, a);
        }
      });
      State.masters.admins = Array.from(existingAdminMap.values());

      // Merge budders: dedupe by username (or name if no username)
      const existingByKey = new Map();
      State.masters.budders.forEach(b => {
        if (typeof b === 'object' && b) existingByKey.set((b.username || b.name || '').toLowerCase(), b);
      });
      (data.masters.budders || []).forEach(b => {
        if (typeof b === 'string') {
          const key = b.toLowerCase();
          if (!existingByKey.has(key)) existingByKey.set(key, { name: b, username: null, password: null, universities: [] });
        } else if (b && typeof b === 'object') {
          const key = (b.username || b.name || '').toLowerCase();
          if (!existingByKey.has(key)) existingByKey.set(key, b);
        }
      });
      State.masters.budders = Array.from(existingByKey.values());

      const existingUnis = new Map(State.masters.universities.map(u => [u.prefix, u]));
      (data.masters.universities || []).forEach(u => {
        if (!existingUnis.has(u.prefix)) existingUnis.set(u.prefix, u);
      });
      State.masters.universities = Array.from(existingUnis.values());

      // Merge counters: take max
      Object.entries(data.masters.counters || {}).forEach(([prefix, count]) => {
        if (!State.masters.counters[prefix] || count > State.masters.counters[prefix]) {
          State.masters.counters[prefix] = count;
        }
      });

      const existingIds = new Set(State.tickets.map(t => t.id));
      const newTickets = data.tickets.filter(t => !existingIds.has(t.id));

      await Store.saveMasters();
      for (const t of newTickets) await Store.saveTicket(t);
      for (const [id, imgs] of Object.entries(data.images || {})) {
        if (!existingIds.has(id)) await Store.saveImages(id, imgs);
      }
    }
    closeModal();
    delete window._importData;
    toast(`✓ Import ${mode} สำเร็จ`, 'success');
  } catch (e) {
    toast('Import ไม่สำเร็จ: ' + e.message, 'error');
  }
}

/* =========================================================
   INIT
   ========================================================= */
async function init() {
  $('#app').innerHTML = `<div class="login-wrap"><div class="login-card" style="text-align:center;"><div class="spinner"></div><div class="text-mute mt-2">กำลังโหลด...</div></div></div>`;

  // Find Firebase config: embedded > saved in localStorage > setup wizard
  let config = EMBEDDED_FIREBASE_CONFIG;
  if (!config) {
    try {
      const stored = localStorage.getItem(LS_KEY_FIREBASE);
      if (stored) config = JSON.parse(stored);
    } catch (e) {}
  }

  if (config) {
    const result = await Store.init(config);
    if (result.ok) {
      Store.subscribeMasters();
      Store.subscribeTickets();
    }
  }

  render();
}

  viewImageFullscreen, addListItem, removeListItem, addUniversity, removeUniversity,
  firstTimeAdminSetup, switchProfile, closeModal, logout, removeImageAt,
  goEditTicket, resetFirebaseConfig, State, renderInner, viewAdminCreate,
  exportBackup, openImportDialog, showImportPreview, performImport,
  openBudderEditorModal, saveBudderEditor, commitBudderSave, commitPendingBudderSave, cancelPendingBudderSave, deleteBudder, toggleBudderPwView,
  openUniversityEditorModal, saveUniversityEditor, confirmUniversityChange, commitUniversityChange,
  openAdminEditorModal, saveAdminEditor, deleteAdmin, toggleAdminPwView,
  confirmReleaseTicket
});

init();
</script>
